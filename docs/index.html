<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0D0B08">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Companions</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ──────────────────────────────────────────────────────────── */
    :root {
      --bg:       #0D0B08;
      --surface:  #1A1814;
      --surfaceB: #211E19;
      --border:   #2A2520;
      --text:     #E8E4DC;
      --dim:      #6B6560;
      --faint:    #3D3830;
      --green:    #4CAF50;
      --orange:   #FF6135;
      --blue:     #42A5F5;
      --yellow:   #FFD54F;
      --red:      #FF6B6B;
    }

    /* ── Base ────────────────────────────────────────────────────────────── */
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; display: flex; flex-direction: column; max-width: 520px;
      margin: 0 auto; position: relative; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn { border: none; border-radius: 14px; padding: 15px 24px; font-size: 16px;
      font-weight: 600; cursor: pointer; width: 100%; transition: opacity .15s;
      font-family: inherit; }
    .btn:hover  { opacity: .88; }
    .btn:active { opacity: .72; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-primary   { background: var(--green);   color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text);
      border: 1px solid var(--border); }
    .btn-ghost { background: none; border: none; color: var(--dim);
      padding: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-ghost:hover { color: var(--text); }
    .btn-sm { padding: 9px 16px; font-size: 14px; border-radius: 10px; }

    /* ── Inputs ──────────────────────────────────────────────────────────── */
    .input { background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 15px 16px; color: var(--text);
      font-size: 17px; width: 100%; outline: none; font-family: inherit;
      transition: border-color .15s; }
    .input:focus { border-color: var(--green); }
    .input.code-input { font-size: 28px; font-weight: 700; letter-spacing: 6px;
      text-align: center; text-transform: uppercase; }

    /* ── Screens ─────────────────────────────────────────────────────────── */
    .screen { flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 24px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom)); overflow-y: auto; }

    /* ── Landing ─────────────────────────────────────────────────────────── */
    .hero { text-align: center; margin-bottom: 48px; }
    .hero-emoji { font-size: 64px; line-height: 1; margin-bottom: 16px; }
    .hero-title { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
    .hero-sub   { color: var(--dim); font-size: 15px; }
    .action-stack { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }

    /* ── Code display ────────────────────────────────────────────────────── */
    .code-block { text-align: center; padding: 28px 0 20px; }
    .code-label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--dim); margin-bottom: 14px; }
    .code-digits { font-size: 44px; font-weight: 800; letter-spacing: 10px;
      color: var(--text); font-variant-numeric: tabular-nums; }
    .code-digits .sep { color: var(--faint); font-weight: 300; letter-spacing: 4px; }

    /* ── QR ──────────────────────────────────────────────────────────────── */
    .qr-wrap { background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; display: inline-flex;
      align-items: center; justify-content: center; margin: 4px 0 12px; }
    #qr-canvas { display: block; border-radius: 8px; }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    .status-bar { display: flex; align-items: center; gap: 10px; padding: 11px 16px;
      border-bottom: 1px solid var(--border); font-size: 12px; flex-shrink: 0; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.on  { background: var(--green); }
    .status-dot.off { background: var(--dim); }
    .status-role { color: var(--dim); font-weight: 600; letter-spacing: .5px; }
    .status-code { color: var(--faint); margin-left: auto; letter-spacing: 1px; }
    .status-peers { color: var(--dim); }
    .offline-banner { background: var(--surfaceB); border-bottom: 1px solid var(--border);
      padding: 8px 16px; font-size: 13px; color: var(--dim); text-align: center;
      flex-shrink: 0; }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tab-bar { display: flex; border-top: 1px solid var(--border); background: var(--bg);
      flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
    .tab-btn { flex: 1; padding: 13px 0 9px; background: none; border: none;
      cursor: pointer; font-size: 24px; opacity: .32; transition: opacity .15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .tab-btn span.label { font-size: 10px; font-weight: 600; letter-spacing: .4px; }
    .tab-btn.active { opacity: 1; }

    /* ── Tab content ─────────────────────────────────────────────────────── */
    .tab-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 40px 24px; }
    .placeholder-icon  { font-size: 40px; opacity: .3; }
    .placeholder-title { font-size: 16px; font-weight: 600; color: var(--dim); }
    .placeholder-sub   { font-size: 13px; color: var(--faint); text-align: center; }

    /* ── Misc ────────────────────────────────────────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; align-items: center; }
    .center { text-align: center; }
    .muted  { color: var(--dim);   font-size: 14px; }
    .small  { color: var(--faint); font-size: 12px; }
    .error  { color: var(--red);   font-size: 14px; text-align: center; }
    .warn   { color: var(--orange); font-size: 13px; text-align: center; }
    .link-text { color: var(--dim); font-size: 12px; word-break: break-all; }
    .divider { width: 100%; height: 1px; background: var(--border); }
    .spinner { display: inline-block; width: 22px; height: 22px;
      border: 2px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-btn { align-self: flex-start; margin-bottom: 8px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub   { color: var(--dim); font-size: 14px; margin-bottom: 32px; }
    .copy-row { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 340px; }
    .copy-row .link-text { flex: 1; }
    .waiting-row { display: flex; align-items: center; gap: 10px; color: var(--dim); font-size: 14px; margin-top: 8px; }

    /* ── Vault ───────────────────────────────────────────────────────────── */
    .vault-wrap { display: flex; flex-direction: column; }
    .vault-breadcrumb { display: flex; align-items: center; gap: 2px; padding: 10px 12px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0;
      position: sticky; top: 0; background: var(--bg); z-index: 1; }
    .vault-crumb-btn { background: none; border: none; color: var(--dim); font-size: 13px;
      cursor: pointer; padding: 3px 6px; border-radius: 6px; font-family: inherit; }
    .vault-crumb-btn:hover { color: var(--text); background: var(--surfaceB); }
    .vault-crumb-cur { font-size: 13px; color: var(--text); font-weight: 600; padding: 3px 6px; }
    .vault-sep { color: var(--faint); font-size: 13px; padding: 0 1px; }
    .vault-list { display: flex; flex-direction: column; }
    .vault-entry { width: 100%; background: none; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); display: flex; align-items: center; gap: 12px; padding: 13px 16px;
      cursor: pointer; font-family: inherit; font-size: 14px; text-align: left;
      transition: background .1s; }
    .vault-entry:hover { background: var(--surfaceB); }
    .vault-entry-icon { font-size: 15px; flex-shrink: 0; }
    .vault-entry-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vault-entry-arrow { color: var(--faint); font-size: 16px; }
    .vault-empty { padding: 48px 16px; text-align: center; color: var(--dim); font-size: 14px; }
    .vault-loading { padding: 48px; display: flex; justify-content: center; }
    .vault-error { padding: 8px 16px; text-align: left; }
    .vault-editor-wrap { display: flex; flex-direction: column; height: 100%; }
    .vault-editor-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      position: sticky; top: 0; background: var(--bg); z-index: 1; }
    .vault-editor-filename { flex: 1; font-size: 14px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--dim); }
    .vault-editor { width: 100%; min-height: 70vh; background: var(--bg); color: var(--text);
      border: none; resize: none; outline: none; padding: 16px;
      font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
      font-size: 13px; line-height: 1.7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="app.js"></script>
  <script type="module" src="vault-tab.js"></script>
</body>
</html>
